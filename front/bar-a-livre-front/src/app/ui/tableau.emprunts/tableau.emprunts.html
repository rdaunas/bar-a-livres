<table mat-table [dataSource]="dataSource" class="mat-elevation-z4 custom-table">

  <!-- User -->
  <ng-container matColumnDef="userId">
    <th mat-header-cell *matHeaderCellDef> Utilisateur </th>
    <td mat-cell *matCellDef="let element">
      <span class="user">{{ element.userId }}</span>
    </td>
  </ng-container>

  <!-- ISBN -->
  <ng-container matColumnDef="isbn">
    <th mat-header-cell *matHeaderCellDef> ISBN </th>
    <td mat-cell *matCellDef="let element">
      <code>{{ element.livreIsbn }}</code>
    </td>
  </ng-container>

  <!-- Status -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Statut </th>
    <td mat-cell *matCellDef="let element">
      <span class="badge" [ngClass]="element.typeStatus">
        {{ element.typeStatus }}
      </span>
    </td>
  </ng-container>

  <!-- Dates -->
  <ng-container matColumnDef="dateDemande">
    <th mat-header-cell *matHeaderCellDef> Demande </th>
    <td mat-cell *matCellDef="let element">
      {{ element.dateDemande}}
    </td>
  </ng-container>

  <ng-container matColumnDef="dateEmprunt">
    <th mat-header-cell *matHeaderCellDef> Emprunt </th>
    <td mat-cell *matCellDef="let element">
      {{ element.dateEmprunt}}
    </td>
  </ng-container>

  <ng-container matColumnDef="dateRetourPrevisionnel">
    <th mat-header-cell *matHeaderCellDef> Retour </th>
    <td mat-cell *matCellDef="let element">
      {{ element.dateRetourPrevisionnel}}
    </td>
  </ng-container>

  <!-- Actions -->
  <ng-container matColumnDef="action">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let element">
      <div class="actions">
        <button mat-raised-button color="primary" (click)="onValider(element)">
          ✔ Valider le retour
        </button>

        <button mat-stroked-button color="warn">
          ✖ Annuler
        </button>
      </div>
    </td>
  </ng-container>

  <!-- Rows -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="row-hover"></tr>
</table>
