<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- userId Column -->
  <ng-container matColumnDef="userId">
    <th mat-header-cell *matHeaderCellDef> User </th>
    <td mat-cell *matCellDef="let element"> {{element.userId}} </td>
  </ng-container>

  <!-- isbn Column -->
  <ng-container matColumnDef="isbn">
    <th mat-header-cell *matHeaderCellDef> ISBN </th>
    <td mat-cell *matCellDef="let element"> {{element.isbn}} </td>
  </ng-container>

  <!-- status Column -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let element"> {{element.status}} </td>
  </ng-container>

  <!-- dateDemande Column -->
  <ng-container matColumnDef="dateDemande">
    <th mat-header-cell *matHeaderCellDef> Date de demande </th>
    <td mat-cell *matCellDef="let element"> {{element.dateDemande}} </td>
  </ng-container>

  <!-- dateEmprunt Column -->
  <ng-container matColumnDef="dateEmprunt">
    <th mat-header-cell *matHeaderCellDef> Date d'emprunt </th>
    <td mat-cell *matCellDef="let element"> {{element.dateEmprunt}} </td>
  </ng-container>

  <!-- dateRetourPrevisionnel Column -->
  <ng-container matColumnDef="dateRetourPrevisionnel">
    <th mat-header-cell *matHeaderCellDef> Date de retour prévisionnel </th>
    <td mat-cell *matCellDef="let element"> {{element.dateRetourPrevisionnel}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
