<mat-toolbar color="primary" class="navbar">

  <!-- ── Gauche : Retour + Home + Titre ── -->
  <div class="navbar__left">
    <button mat-icon-button (click)="goBack()" aria-label="Retour" matTooltip="Retour">
      <mat-icon>arrow_back</mat-icon>
    </button>

    <button mat-icon-button routerLink="/" aria-label="Accueil" matTooltip="Accueil">
      <mat-icon>home</mat-icon>
    </button>

    <span class="navbar__title">Bar à livres</span>
  </div>

  <span class="navbar__spacer"></span>

  <!-- ── Desktop : menu ul/li ── -->
  <nav class="navbar__menu" aria-label="Navigation principale">
    <ul class="navbar__list">

      <!-- Rôle user : non connecté -->
        <li>
          <a mat-button routerLink="/inscription" routerLinkActive="navbar__link--active">
            <mat-icon matPrefix>person_add</mat-icon>
            Inscription
          </a>
        </li>
        <li>
          <a mat-flat-button routerLink="/connexion" class="navbar__btn-rounded">
            Connexion
          </a>
        </li>

      <!-- Rôles connectés : items dynamiques -->


    </ul>
  </nav>

  <!-- ── Mobile : hamburger ── -->
  <button mat-icon-button
          class="navbar__hamburger"
          [matMenuTriggerFor]="mobileMenu"
          aria-label="Ouvrir le menu">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Menu mobile -->
  <mat-menu #mobileMenu="matMenu">



  </mat-menu>

</mat-toolbar>
